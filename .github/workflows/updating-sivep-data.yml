name: updating-sivep-data
on:
  push:
    branches: main
  schedule:
    - cron: "05 22 * * 3"

jobs:
  run:
    runs-on: [macOS-latest]
    steps:
      - uses: actions/checkout@main
      - uses: r-lib/actions/setup-r@v1
       #with:
          #r-version: '4.1.0' # The R version to download (if necessary) and use.
      - run: Rscript -e 'print(paste0("Updating data at", as.Date(Sys.time())))'
      - name: Install packages
        run: Rscript -e 'install.packages(c("tidyverse", "zoo", "here", "data.table"))'
      - name: Run script 
        run: Rscript -e 'source(here::here("code", "app_update_sivep.R"))'
    - name: Commit results
      run: |
          git add .
          git commit -m 'updating sivep data' || echo "No changes to commit"
          git push origin || echo "No changes to commit"
